apiVersion: v1
kind: Service
metadata:
  name: nginx
 #namespace: roboshop
spec:
  selector:
    project: roboshop
    component: frontend
    environment: dev
  ports:
   - protocol: TCP
     port: 80 #port on which the service is exposed
     targetPort: 80 
     nodeport: 31221 #he service is exposed on the node, only for NodePort type