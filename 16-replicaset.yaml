apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx
#this labels are using for replica set labels
  labels:
    project:  roboshop
    purpose:  rs-demo
    component: frontend
    enironment: dev
    tier: frontend
spec:
  replicas: 3
  selector:
      matchLabels:
      project:  roboshop
      purpose: rs-demo
      component: frontend
      enironment: dev
      tier: frontend
  # using the template to create the pod(or)this is a pod defination,pod subset of replicaset
template:
   metadata:
     labels:
       project:  roboshop
       purpose: rs-demo
       component: frontend
       enironment: dev
       tier: frontend
   spec:
     containers:
     - name: nginx
       image: nginx