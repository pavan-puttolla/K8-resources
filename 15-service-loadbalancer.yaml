apiVersion: v1
kind: Service
metadata:
  name: nginx-lb
 #namespace: roboshop
spec:
  type: LoadBalancer
  selector:
  # labels are used as selectors  
    project: roboshop
    component: frontend
    environment: dev
  ports:
   - protocol: TCP
     port: 80 #port on which the service is exposed
     targetPort: 80 
     nodePort: 32189 #the service is exposed on the node, only for NodePort type